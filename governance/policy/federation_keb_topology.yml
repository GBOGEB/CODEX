  consumers:
    - GGA
    - GGC
    - GGX

shared_glossary_topology:
  root: KEB/
  structure:
    - governance/GLOSSARY.yml
    - governance/adr_index.yml
    - governance/governance_rules.yml
    - governance/metrics.yml
