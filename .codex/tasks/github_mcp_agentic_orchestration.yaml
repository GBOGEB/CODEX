task:
  id: "CODEX-MCP-GITHUB-AGENTIC-ORCHESTRATION"
  type: "mcp_container"
  title: "Agentic GitHub MCP PR Follow-Up and Fix Loop"
  source_basis: "G10/A6.1 runtime governance pack"

  objective:
    - "Discover PR discrepancies from CI, review comments, lint, tests, and SSOT drift."
    - "Prepare proposed fixes automatically."
    - "Show the user the comment, diagnosis, and proposed patch before commit."
    - "Support single confirm commit or bulk confirm commit."
    - "Support @copilot-style delegation where available."

  human_gate:
    required_before_commit: true
    modes:
      - "confirm_each"
      - "bulk_confirm"
      - "answer_only"
      - "fix_and_stage_only"
      - "reject_fix"

  agents:
    github_mcp_reader:
      purpose: "Read PR, files, comments, checks, reviews, changed files."
    discrepancy_detector:
      purpose: "Compare PR state against SSOT, workflows, tests, and review comments."
    fix_planner:
      purpose: "Generate proposed changes and explain why."
    patch_applier:
      purpose: "Apply local patch only after approval."
    comment_responder:
      purpose: "Draft reply to reviewer or @copilot-style comment."
    commit_guard:
      purpose: "Prevent unapproved commits."

  triggers:
    # ── EVENT-DRIVEN ──────────────────────────────────────────────────────────
    local_source_push:
      command: "git push origin <branch>"
      next: "open_or_update_pr"

    github_pr_comment:
      patterns:
        - "@copilot fix"
        - "@codex fix"
        - "/agent fix"
        - "/agent explain"
        - "/agent propose"
      next: "read_comment_then_prepare_fix"
      note: "All fix commands require human confirmation before commit (per human_gate.required_before_commit)"

    ci_failure:
      next: "diagnose_failure_prepare_patch"

    # ── AD-HOC / MANUAL ───────────────────────────────────────────────────────
    workflow_dispatch:
      description: >
        Trigger from the GitHub Actions UI or via `gh workflow run` for on-demand
        scans without a PR event.  Supports mode (scan_only | propose_fixes |
        answer_only) and an optional pr_number input.
      workflow_file: ".github/workflows/agentic-pr-discrepancy-scan.yml"
      cli_example: >
        gh workflow run agentic-pr-discrepancy-scan.yml \
          -f mode=propose_fixes -f pr_number=42

    local_offline:
      description: >
        Run entirely offline (no GitHub Actions) using the local runner.
        Suitable for iterative, repetitive, or air-gapped environments.
      script: "scripts/run_mcp_orchestration.py"
      examples:
        ad_hoc: "python scripts/run_mcp_orchestration.py --mode scan_only --pr 42"
        continuous: "python scripts/run_mcp_orchestration.py --loop --interval 360"
        iterative: "python scripts/run_mcp_orchestration.py --loop --iterations 5"

    # ── CONTINUOUS / SCHEDULED ────────────────────────────────────────────────
    scheduled:
      description: >
        GitHub Actions cron job — runs every 6 hours to catch SSOT drift and
        open discrepancies between sessions.
      cron: "0 */6 * * *"
      workflow_file: ".github/workflows/agentic-pr-discrepancy-scan.yml"

  outputs:
    - "AGENTIC/agentic_pr_followup_log.yaml"
    - "AGENTIC/proposed_fixes.yaml"
    - "AGENTIC/comment_response_drafts.md"
    - "METRICS/agentic_ascii_metrics.md"  # Committed specification/template
    - "METRICS/agentic_pr_scan_output.md"  # Runtime workflow output
