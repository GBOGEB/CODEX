glossary:
  metadata:
    title: HBHS-EP CODEX ABACUS Engineering Glossary
    purpose: Canonical quick-reference glossary for recurring architectural, operational, scientific, governance, MCP, and BASIC terminology.
    scope:
      - CODEX
      - ABACUS
      - BRIDGE
      - HBHS-EP
      - MCP
      - BASIC operational language
    governance:
      canonical_source: SSOT
      format: YAML
      update_policy: append_and_trace
      recursive_growth_limit: true

  architecture:
    SSOT:
      type: noun
      definition: Single Source of Truth. Canonical structured representation from which outputs are deterministically generated.
      aliases: [master_yaml, canonical_model]
    topology:
      type: noun
      definition: Structural interaction map of repositories, waves, runtime systems, telemetry, and governance layers.
    federation:
      type: noun
      definition: Operationally synchronized specialized repositories exchanging telemetry, lineage, and runtime contracts.
    bridge:
      type: noun
      definition: Cross-repository continuity layer enabling telemetry, contracts, deployment lineage, and survivability exchange.
    covariance:
      type: noun
      definition: Nonlinear operational influence between waves, systems, repositories, telemetry, or governance structures.
    lineage:
      type: noun
      definition: Traceable historical and dependency path of artifacts, waves, decisions, telemetry, and outputs.

  governance:
    survivability:
      type: noun
      definition: Long-term operational continuity under entropy, deployment drift, personnel rotation, and runtime evolution.
    rebuildability:
      type: noun
      definition: Ability to reconstruct runtime and operational state from canonical artifacts and repositories.
    entropy:
      type: noun
      definition: Accumulated operational disorder, drift, fragmentation, or deployment instability.
    recursive_overgrowth:
      type: noun
      definition: Excessive recursive sophistication exceeding operational usability or survivability value.
    bounded_recursion:
      type: noun
      definition: Recursive growth constrained by evidence, survivability, and operational utility.

  telemetry:
    telemetry:
      type: noun
      definition: Runtime signals, metrics, convergence data, and operational measurements emitted by systems.
    observability:
      type: noun
      definition: Ability to inspect, interpret, and diagnose runtime behavior, convergence, and operational continuity.
    dashboard_sprawl:
      type: noun
      definition: Excessive proliferation of dashboards causing operational overload and usability degradation.
    KPI:
      type: noun
      definition: Key Performance Indicator used for convergence, survivability, or operational tracking.

  scientific:
    thermo_kernel:
      type: noun
      definition: Core thermodynamic computational engine handling state properties, transitions, and convergence.
    backend_compare:
      type: noun
      definition: Comparative evaluation between computational property engines or scientific backends.
    low_temperature_realism:
      type: noun
      definition: Fidelity of thermodynamic behavior near cryogenic and helium-II operational regions.
    exergy:
      type: noun
      definition: Maximum useful work obtainable from a thermodynamic system relative to a reference environment.
    NIST_alignment:
      type: noun
      definition: Agreement between computational outputs and NIST reference thermodynamic data.

  MCP:
    MCP:
      type: noun
      definition: Model Context Protocol. Structured interoperability layer for models, runtime systems, agents, and external tools.
    MCP_server:
      type: noun
      definition: Runtime endpoint exposing governed capabilities, telemetry, or tools through MCP interfaces.
    MCP_client:
      type: noun
      definition: Consumer interacting with MCP-governed runtime services.
    tool_contract:
      type: noun
      definition: Defined operational interface specifying inputs, outputs, permissions, and telemetry expectations.
    context_window:
      type: noun
      definition: Operational memory and reasoning scope available to an active model runtime.
    agent:
      type: noun
      definition: Structured autonomous or semi-autonomous orchestration component operating under governance constraints.

  BASIC_verbs:
    initialize: Establish initial runtime, telemetry, or operational state.
    normalize: Reduce variability or entropy toward stable governed form.
    stabilize: Reduce operational volatility and improve survivability.
    converge: Progress toward validated operational or scientific closure.
    operationalize: Convert conceptual capability into survivable deployable form.
    federate: Connect specialized systems through governed runtime exchange.
    synchronize: Maintain temporal and operational consistency across systems.
    harden: Improve resilience, survivability, and operational stability.
    bridge: Connect repositories, runtimes, or telemetry domains.
    deploy: Publish governed runtime capability into operational use.
    render: Deterministically generate operational outputs from canonical structured sources.
    trace: Maintain lineage and operational visibility of changes, telemetry, or artifacts.
    validate: Confirm correctness against reference evidence or fixtures.
    recurse: Iteratively elaborate systems or governance structures.
    simplify: Reduce operational burden while preserving functionality.
    govern: Apply operational rules, survivability constraints, and continuity enforcement.

  repeated_phrases:
    operational_survivability: Long-term deployable continuity under realistic runtime, telemetry, and infrastructure constraints.
    bounded_governance: Governance constrained by operational utility and maintainability limits.
    deployment_entropy: Accumulated instability and fragmentation in deployment pipelines and runtime continuity.
    operator_centered: Designed primarily for human usability and interpretability.
    recursive_sophistication: Degree of layered abstraction and governance recursion.
    telemetry_bounded: Constrained by available operational evidence and runtime measurement density.
    hosted_runtime: User-facing operational environment deployed through GitHub Pages or equivalent runtime infrastructure.
    topology_intelligence: Understanding and governance of interconnected operational structures and dependencies.
    operational_truth_closure: Maximum realistically achievable engineering certainty given telemetry, evidence, and survivability constraints.
