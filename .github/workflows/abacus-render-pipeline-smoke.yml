name: ABACUS Render Pipeline Smoke Test
on:
  push:
    branches: [ main, a6-renderer-governance-layer ]
  pull_request:
    branches: [ main ]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Execute Core Script Compilation Verification
        run: |
          if [ -f src/abacus_render_pipeline/orchestrate.py ]; then
            python src/abacus_render_pipeline/orchestrate.py --smoke
          else
            echo "Execution bypass: Root orchestration script not located."
          fi
