name: Release & Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building release: $TAG"

      - name: Validate critical files
        run: |
          echo "=== Pre-release validation ==="
          ERRORS=0
          for f in docs/index.html docs/dashboard.html pyproject.toml src/__init__.py; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              ERRORS=$((ERRORS+1))
            else
              echo "✅ $f"
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "Release blocked: $ERRORS missing files"
            exit 1
          fi

      - name: Python syntax check
        run: |
          echo "=== Syntax validation ==="
          ERRORS=0
          while IFS= read -r f; do
            if python3 -m py_compile "$f" 2>/dev/null; then
              echo "✅ $f"
            else
              echo "❌ Syntax error: $f"
              ERRORS=$((ERRORS+1))
            fi
          done < <(find src -name '*.py' -type f 2>/dev/null)
          if [ $ERRORS -gt 0 ]; then
            echo "Release blocked: $ERRORS files with syntax errors"
            exit 1
          fi

      - name: Run tests
        run: |
          pip install -r requirements.txt --quiet
          pip install pytest --quiet
          pip install -e . --quiet
          python -m pytest -q

      - name: Package documentation and outputs
        run: |
          echo "=== Packaging release artifacts ==="
          mkdir -p release-artifacts
          MISSING_DIRS=()
          for d in docs/ outputs/; do
            [ -d "$d" ] || MISSING_DIRS+=("$d")
          done
          if [ ${#MISSING_DIRS[@]} -gt 0 ]; then
            echo "⚠️  Missing optional directories: ${MISSING_DIRS[*]}"
          fi
          DIRS_TO_PACK=()
          [ -d docs/ ]    && DIRS_TO_PACK+=(docs/)
          [ -d outputs/ ] && DIRS_TO_PACK+=(outputs/)
          if [ ${#DIRS_TO_PACK[@]} -gt 0 ]; then
            tar czf release-artifacts/codex-docs-${{ steps.version.outputs.tag }}.tar.gz \
              "${DIRS_TO_PACK[@]}"
            echo "Package size: $(du -h release-artifacts/*.tar.gz | cut -f1)"
          fi

      - name: Build Python wheel
        run: |
          pip install build --quiet
          python -m build --wheel --outdir release-artifacts/
          echo "Wheel: $(ls release-artifacts/*.whl 2>/dev/null || echo 'none')"

      - name: Generate release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if PREV_REF=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null); then
            COMMITS=$(git log --oneline "$PREV_REF"..HEAD 2>/dev/null | head -20)
          else
            PREV_REF=$(git rev-list --max-parents=0 HEAD)
            COMMITS=$(git log --oneline "$PREV_REF"..HEAD 2>/dev/null | head -20)
          fi
          [ -n "$COMMITS" ] || COMMITS="Initial release"
          {
            printf '# CODEX %s Release Notes\n\n' "$TAG"
            printf "## What's Included\n"
            printf -- '- 🐍 Python package wheel\n'
            printf -- '- 📖 Documentation bundle (docs/)\n'
            printf -- '- 📊 Generated outputs (outputs/)\n\n'
            printf '## Recent Changes\n%s\n\n' "$COMMITS"
            printf '## Installation\n```bash\npip install codex-%s-py3-none-any.whl\n```\n' "${TAG#v}"
          } > release-artifacts/RELEASE_NOTES.md

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.tag }}
          path: release-artifacts/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          name: release-${{ needs.build.outputs.tag }}
          path: release-artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: "CODEX ${{ needs.build.outputs.tag }}"
          body_path: release-artifacts/RELEASE_NOTES.md
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.whl
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
