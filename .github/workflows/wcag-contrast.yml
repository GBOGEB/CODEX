name: WCAG Contrast Invariant Gatekeeper
on:
  push:
    branches: [ main, a6-renderer-governance-layer ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  wcag-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Execute WCAG Node Assessment
        run: |
          python src/abacus_render_pipeline/orchestrate.py --smoke
