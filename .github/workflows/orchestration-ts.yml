name: Orchestration TypeScript CI

on:
  pull_request:
    paths:
      - 'orchestration_ts/**'
      - '.github/workflows/orchestration-ts.yml'
  push:
    branches:
      - main
    paths:
      - 'orchestration_ts/**'
      - '.github/workflows/orchestration-ts.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: orchestration_ts
        run: npm install

      - name: TypeScript build
        working-directory: orchestration_ts
        run: npm run build

      - name: Route tests
        working-directory: orchestration_ts
        run: npm test
