name: W003 Governance Gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'federation_runtime/**'
  push:
    branches: ['wave/W003-*', 'pr/PR-007-*', 'codex/document-abacus-codex-federation-runtime-plan']
    paths:
      - 'federation_runtime/**'

permissions:
  contents: read

jobs:
  governance-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install governance parser dependency
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
      - name: Validate governance header
        run: |
          python federation_runtime/engines/governance_parser.py \
            --markdown federation_runtime/.github/W003_PR_FOLLOW_UP.md \
            --schema federation_runtime/schema/governance_header.schema.json \
            --traceability-manifest federation_runtime/governance/traceability_manifest.json \
            --pr-track federation_runtime/governance/pr_track.yml \
            --wave-plan federation_runtime/governance/wave_recreation_plan.yml
      - name: Validate traceability manifest shape
        run: |
          python -c "import json; d=json.load(open('federation_runtime/governance/traceability_manifest.json')); assert d.get('active_wave')=='W003', 'active_wave must be W003'; assert str(d.get('current_iteration','')).startswith('I'), 'current_iteration must start with I'; assert isinstance(d.get('required_artifacts'), dict), 'required_artifacts must be an object'; assert 'pr_stream' in d, 'pr_stream is required'"
