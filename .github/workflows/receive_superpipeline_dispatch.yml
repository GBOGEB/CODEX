name: Receive SUPERPIPELINE Render Request

on:
  repository_dispatch:
    types:
      - superpipeline.render_request.v1
  workflow_dispatch:
    inputs:
      payload:
        description: 'SUPERPIPELINE render request JSON for manual rendering'
        required: true
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  render-superpipeline-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CODEX
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract SUPERPIPELINE request
        run: |
          mkdir -p federation_artifacts
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          if "client_payload" in event:
              payload = event["client_payload"]
          else:
              payload = json.loads(event.get("inputs", {}).get("payload", "{}"))
          Path("federation_artifacts/superpipeline_render_request.json").write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Validate and unwrap render request
        run: |
          python -m codex.bridges.superpipeline_payload \
            --input federation_artifacts/superpipeline_render_request.json \
            --telemetry-output federation_artifacts/renderer_telemetry.json \
            --artifact-name-output federation_artifacts/artifact_name.txt

      - name: Render CODEX technical status report
        run: |
          artifact_name="$(cat federation_artifacts/artifact_name.txt)"
          python -m codex.renderers.abacus_report \
            --input federation_artifacts/renderer_telemetry.json \
            --output "federation_artifacts/${artifact_name}"

      - name: Upload rendered report
        uses: actions/upload-artifact@v4
        with:
          name: superpipeline-rendered-report
          path: federation_artifacts/
