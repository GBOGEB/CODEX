name: Full Stack Governance CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'feature/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lineage-governance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - codex
          - abacus
          - mcp-bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Repository lineage
        run: |
          echo "component=${{ matrix.component }}"
          echo "workflow=${{ github.workflow }}"
          echo "sha=${{ github.sha }}"
          echo "ref=${{ github.ref }}"

      - name: Governance validation
        run: |
          set -euo pipefail
          component_dir="reports/${{ matrix.component }}"
          mkdir -p "${component_dir}"
          {
            echo "component=${{ matrix.component }}"
            echo "workflow=${{ github.workflow }}"
            echo "sha=${{ github.sha }}"
            echo "ref=${{ github.ref }}"
          } > "${component_dir}/summary.txt"

          case "${{ matrix.component }}" in
            codex)
              python scripts/check_manifest.py | tee "${component_dir}/manifest.txt"
              python scripts/check_links.py | tee "${component_dir}/links.txt"
              checks="manifest,links"
              ;;
            abacus)
              python scripts/check_globs.py | tee "${component_dir}/globs.txt"
              python scripts/check_stale.py | tee "${component_dir}/stale.txt"
              python governance/RENDER_LINTER.py | tee "${component_dir}/render_linter.txt"
              checks="globs,stale,render_linter"
              ;;
            mcp-bridge)
              python -m pytest -q tests/test_drift_monitor.py | tee "${component_dir}/pytest.txt"
              python telemetry/pca/drift_monitor.py | tee "${component_dir}/bootstrap.txt"
              cp telemetry/pca/drift_payload_sample.json "${component_dir}/drift_payload.json"
              python telemetry/pca/drift_monitor.py --input telemetry/pca/drift_payload_sample.json > "${component_dir}/drift_report.json"
              cat "${component_dir}/drift_report.json"
              python scripts/check_version.py | tee "${component_dir}/version.txt"
              python scripts/export_abacus_runtime.py --report-json "${component_dir}/bridge_report.json" | tee "${component_dir}/runtime_export.txt"
              checks="drift_monitor,version,pytest,runtime_export"
              ;;
          esac

          printf 'governance=lineage-tracked\nstatus=passed\nchecks=%s\n' "${checks}" > "${component_dir}/lineage.txt"
          cat "${component_dir}/lineage.txt"

      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-${{ matrix.component }}
          path: reports/${{ matrix.component }}

  bridge-audit:
    runs-on: ubuntu-latest
    needs: lineage-governance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Federation governance bridge audit
        run: python scripts/check_federation_governance.py

  federation-bridge-build:
    runs-on: ubuntu-latest
    needs: lineage-governance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q plotly pyyaml

      - name: Generate federation bridge artifacts
        run: |
          python docs/wave_packages/runtime/federation_bridge_cli.py
          echo "✓ Federation bridge CLI executed"

      - name: Verify canonical output path
        run: |
          if [ -d "docs/wave_packages/runtime/out" ]; then
            echo "✓ Federation bridge artifacts generated"
            ls -lh docs/wave_packages/runtime/out/
          else
            echo "⚠ No output artifacts generated"
            exit 1
          fi

      - name: Copy to canonical outputs/html/federation_bridge
        run: |
          mkdir -p outputs/html/federation_bridge
          if [ -d "docs/wave_packages/runtime/pages" ]; then
            cp -r docs/wave_packages/runtime/pages/* outputs/html/federation_bridge/ || true
            echo "✓ Artifacts copied to canonical outputs/html/federation_bridge/"
          fi

      - name: Upload federation bridge artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: federation-bridge-output
          path: |
            docs/wave_packages/runtime/out/
            docs/wave_packages/runtime/pages/
            outputs/html/federation_bridge/

  release-readiness:
    runs-on: ubuntu-latest
    needs:
      - bridge-audit
      - federation-bridge-build

    steps:
      - name: Release lineage gate
        run: |
          echo 'Release readiness gate passed'
          echo 'Version lineage preserved'
          echo 'Federation bridge artifacts generated'
