name: Full Stack Governance CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'feature/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lineage-governance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - codex
          - abacus
          - mcp-bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Repository lineage
        run: |
          echo "component=${{ matrix.component }}"
          echo "workflow=${{ github.workflow }}"
          echo "sha=${{ github.sha }}"
          echo "ref=${{ github.ref }}"

      - name: Governance integration checks
        run: |
          mkdir -p reports/${{ matrix.component }}
          python - <<'PY'
          from pathlib import Path
          import os
          import subprocess
          import sys

          component = os.environ["COMPONENT"]
          report_dir = Path("reports") / component
          report_dir.mkdir(parents=True, exist_ok=True)

          checks = {
              "codex": [
                  ("federation_runtime/engines/governance_parser.py", "governance parser"),
                  ("federation_runtime/schema/governance_header.schema.json", "governance schema"),
              ],
              "abacus": [
                  ("abacus_render_pipeline", "abacus render pipeline"),
                  ("src/abacus_render_pipeline", "abacus source runtime"),
              ],
              "mcp-bridge": [
                  ("federation_bridge", "federation bridge"),
                  ("output/federation_bridge", "bridge output namespace"),
              ],
          }

          missing = []
          for path, label in checks.get(component, []):
              if not Path(path).exists():
                  missing.append(f"{label} missing at {path}")

          if component == "codex":
              command = [
                  sys.executable,
                  "federation_runtime/engines/governance_parser.py",
                  "--target",
                  "federation_runtime/.github/W003_PR_FOLLOW_UP.md",
                  "--schema",
                  "federation_runtime/schema/governance_header.schema.json",
                  "--traceability-manifest",
                  "federation_runtime/governance/traceability_manifest.json",
                  "--pr-track",
                  "federation_runtime/governance/pr_track.yml",
                  "--wave-plan",
                  "federation_runtime/governance/wave_recreation_plan.yml",
              ]
              completed = subprocess.run(command, check=False, capture_output=True, text=True)
              (report_dir / "governance_parser.log").write_text(completed.stdout + completed.stderr, encoding="utf-8")
              if completed.returncode != 0:
                  print(completed.stdout)
                  print(completed.stderr)
                  missing.append("governance parser command failed; see governance_parser.log")

          status = "pass" if not missing else "fail"
          details = "\n".join(missing) if missing else "all checks passed"
          (report_dir / "lineage.txt").write_text(
              f"governance=lineage-tracked\nstatus={status}\ndetail={details}\n",
              encoding="utf-8",
          )
          print((report_dir / "lineage.txt").read_text(encoding="utf-8"))

          if missing:
              raise SystemExit(1)
          PY
        env:
          COMPONENT: ${{ matrix.component }}

      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-${{ matrix.component }}
          path: reports/${{ matrix.component }}

  bridge-audit:
    runs-on: ubuntu-latest
    needs: lineage-governance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Federation governance bridge audit
        run: python scripts/check_federation_governance.py

  release-readiness:
    runs-on: ubuntu-latest
    needs:
      - bridge-audit

    steps:
      - name: Release lineage gate
        run: |
          echo 'Release readiness gate passed'
          echo 'Version lineage preserved'
