name: Contract Workbench SSOT

on:
  pull_request:
    paths:
      - "MASTER_input/**"
      - "src/contract_workbench/**"
      - "scripts/check_contract_workbench.py"
      - "scripts/generate_contract_workbench.py"
      - "tests/test_contract_workbench.py"
      - ".github/workflows/contract-workbench.yml"
  push:
    paths:
      - "MASTER_input/**"
      - "src/contract_workbench/**"
      - "scripts/check_contract_workbench.py"
      - "scripts/generate_contract_workbench.py"
      - "tests/test_contract_workbench.py"
      - ".github/workflows/contract-workbench.yml"

jobs:
  drift-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate MASTER Contract Workbench SSOT
        run: python scripts/check_contract_workbench.py
      - name: Run Contract Workbench tests
        run: python -m pytest -q tests/test_contract_workbench.py
