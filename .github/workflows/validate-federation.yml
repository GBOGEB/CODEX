name: Validate Federation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Run federation validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run validation
        run: python scripts/validate_all.py
