name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Build verified Pages output
        run: |
          if [ -f tools/losses/src/build_all.py ]; then
            python tools/losses/src/build_all.py
          fi
          python orchestrate_g3.py
          python scripts/check_manifest.py
          python scripts/check_globs.py
          python scripts/check_stale.py
          python scripts/check_links.py
          pytest -q

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -a docs/. _site/
          if [ -d outputs ]; then
            mkdir -p _site/outputs
            cp -a outputs/. _site/outputs/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
