name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: ["Runtime Release Gate"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Generate runtime evidence for hosted portal
        run: |
          python scripts/bridge_rtm_ingress.py --json-out reports/rtm_summary.json
          python docs/wave_packages/runtime/federation_bridge_cli.py
          python docs/wave_packages/runtime/reality_tracker.py
          python scripts/emit_runtime_status.py --out reports/runtime_status.json

      - name: Build verified Pages output
        run: |
          if [ -f tools/losses/src/build_all.py ]; then
            python tools/losses/src/build_all.py
          fi
          python orchestrate_g3.py
          python scripts/check_manifest.py
          python scripts/check_globs.py
          python scripts/check_stale.py
          python scripts/check_links.py
          pytest -q tests/test_runtime_validation.py tests/test_drift_monitor.py

      - name: Verify release artifacts prior to staging
        run: |
          test -f reports/runtime_status.json
          test -f reports/rtm_summary.json
          test -f docs/wave_packages/runtime/pages/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -a docs/. _site/
          if [ -d outputs ]; then
            mkdir -p _site/outputs
            cp -a outputs/. _site/outputs/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
