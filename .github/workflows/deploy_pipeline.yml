name: G5 Unified Lifecycle Execution & Deployment Gateway

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  g5-build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Checkout Code Architecture
      uses: actions/checkout@v4

    - name: Initialize G5 Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute G5 Master Orchestrator and Bake Artifacts
      run: python orchestrate_g5.py

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Stage Pages artifact
      run: |
        rm -rf _site
        mkdir -p _site
        cp -a docs/. _site/
        if [ -d outputs ]; then
          mkdir -p _site/outputs
          cp -a outputs/. _site/outputs/
        fi

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
