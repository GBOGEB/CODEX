name: G3 Federation Architecture Execution Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  g3-compile-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Local Git Codebase Target
      uses: actions/checkout@v4

    - name: Initialize G3 Python Analysis Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Provision Statistical Analysis Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute G3 Process Matrix and Generate Target Artifacts
      run: python orchestrate_g3.py

    - name: Archive and Publish Production Dashboard Artifacts
      if: github.event_name == 'push'
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs'

  deploy:
    if: github.event_name == 'push'
    needs: g3-compile-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
