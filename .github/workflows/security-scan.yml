name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  security-scan:
    name: security-scan (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
    env:
      SARIF_PATH: reports/security/results.sarif
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install scanner
        run: python -m pip install --upgrade pip ruff

      - name: Generate SARIF
        continue-on-error: true
        shell: bash
        run: |
          python -c "from pathlib import Path; Path(r'${{ env.SARIF_PATH }}').parent.mkdir(parents=True, exist_ok=True)"
          ruff check . --output-format sarif --exit-zero --output-file "${{ env.SARIF_PATH }}"

      - name: Validate SARIF
        id: validate
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sarif_path = Path(r"${{ env.SARIF_PATH }}")
          valid = False
          message = ""

          if sarif_path.exists():
              data = json.loads(sarif_path.read_text(encoding="utf-8"))
              valid = (
                  isinstance(data, dict)
                  and bool(data.get("version"))
                  and isinstance(data.get("runs"), list)
              )
              if not valid:
                  message = "SARIF content is invalid"
          else:
              message = "SARIF file was not generated"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"valid={str(valid).lower()}\n")

          if valid:
              print(f"SARIF validated at {sarif_path}")
              sys.exit(0)

          print(message)
          sys.exit(1)
          PY

      - name: Upload SARIF
        if: steps.validate.outputs.valid == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.SARIF_PATH }}
          category: security-scan-${{ matrix.os }}-py${{ matrix.python-version }}
