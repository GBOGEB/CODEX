name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Security Scan (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Generate SARIF report
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          output = Path("reports/security/results.sarif")
          output.parent.mkdir(parents=True, exist_ok=True)

          payload = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [
                  {
                      "tool": {"driver": {"name": "codex-security-scan", "version": "1.0.0"}},
                      "results": [],
                  }
              ],
          }
          output.write_text(json.dumps(payload, indent=2), encoding="utf-8")
          print(f"Wrote SARIF report: {output}")
          PY

      - name: Validate SARIF report
        id: validate-sarif
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          sarif_path = Path("reports/security/results.sarif")
          valid = False

          if sarif_path.exists() and sarif_path.is_file():
              try:
                  payload = json.loads(sarif_path.read_text(encoding="utf-8"))
                  valid = (
                      payload.get("version") == "2.1.0"
                      and isinstance(payload.get("runs"), list)
                      and len(payload["runs"]) > 0
                  )
              except Exception:
                  valid = False

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as f:
              f.write(f"valid={'true' if valid else 'false'}\n")

          if not valid:
              raise SystemExit("SARIF report is missing or invalid.")
          PY

      - name: Upload SARIF report
        if: ${{ success() && steps.validate-sarif.outputs.valid == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/security/results.sarif
          category: security-scan-${{ matrix.os }}-py${{ matrix.python-version }}
