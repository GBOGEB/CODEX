name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Security Scan (${{ matrix.os }}, py${{ matrix.python.version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python:
          - version: "3.9"
            tag: "39"
          - version: "3.10"
            tag: "310"
          - version: "3.11"
            tag: "311"
          - version: "3.12"
            tag: "312"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python.version }}

      - name: Install scanner
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Generate SARIF report
        shell: bash
        run: |
          mkdir -p reports/security
          ruff check . --select S --output-format sarif --output-file reports/security/results.sarif --exit-zero

      - name: Validate SARIF report
        id: validate-sarif
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          sarif_path = Path("reports/security/results.sarif")
          expected_version = "2.1.0"  # GitHub code scanning currently expects SARIF 2.1.0
          valid = False
          reason = "missing SARIF file"

          if sarif_path.exists() and sarif_path.is_file():
              try:
                  payload = json.loads(sarif_path.read_text(encoding="utf-8"))
                  valid = (
                      payload.get("version") == expected_version
                      and isinstance(payload.get("runs"), list)
                      and len(payload["runs"]) > 0
                  )
                  if not valid:
                      reason = "SARIF structure invalid (expected version 2.1.0 and non-empty runs)"
              except (json.JSONDecodeError, OSError):
                  valid = False
                  reason = "SARIF JSON parse failed"

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as f:
              f.write(f"valid={'true' if valid else 'false'}\n")

          if not valid:
              raise SystemExit(f"SARIF validation failed: {reason}")
          PY

      - name: Upload SARIF report
        if: ${{ steps.validate-sarif.outputs.valid == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/security/results.sarif
          category: security-scan-${{ matrix.os }}-py${{ matrix.python.tag }}
