name: Deploy Governance Artifacts to Pages
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage GitHub Pages Deployment Directory
        run: |
          mkdir -p _site
          cp docs/deck-systems/abacus-render-pipeline/*.html _site/ 2>/dev/null || cp *.html _site/
      - name: Upload Pages Asset Payload
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Publish Live to Gateway Endpoint
        id: deployment
        uses: actions/deploy-pages@v4
