name: Render Parity Synchronization
on:
  push:
    branches: [ main, a6-renderer-governance-layer ]
jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize Processing Core
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify Cross-Format Structural Alignment (HTML <-> Markdown)
        run: |
         python - <<'PY'
         import os
         import sys

         html_exists = os.path.exists(
             "docs/deck-systems/abacus-render-pipeline/runtime_dashboard.html"
         )
         md_exists = os.path.exists(
             "docs/deck-systems/abacus-render-pipeline/runtime_summary.md"
         )
         print("Parity Assessment Active")
         if not (html_exists and md_exists):
             print("Failure: runtime HTML/Markdown parity outputs are not both present.")
             sys.exit(1)
         print("Parity check passed.")
         PY
