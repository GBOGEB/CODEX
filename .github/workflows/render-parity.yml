name: Render Parity Synchronization

on:
  push:
    branches: [main, a6-renderer-governance-layer]
  pull_request:
    branches: [main]

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Markdown-first artifact parity
        run: |
          test -f README.md
          test -f SSOT/g10_runtime_governance_ssot.yaml
          test -f METRICS/g10_ascii_metrics.md
      - name: Check for unauthorized HTML surfaces
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          HEAD_SHA="${{ github.sha }}"

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse "$HEAD_SHA^" >/dev/null 2>&1; then
              BASE_SHA="$(git rev-parse "$HEAD_SHA^")"
            else
              BASE_SHA="$HEAD_SHA"
            fi
          fi

          CHANGED_HTML="$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.html')"
          if [ -z "$CHANGED_HTML" ]; then
            echo "Assertion Verified: Zero unauthorized HTML surfaces detected."
            exit 0
          fi
          UNAUTHORIZED_HTML="$(echo "$CHANGED_HTML" | grep -Ev '^(docs/|outputs/html/)' || true)"

          if [ -n "$UNAUTHORIZED_HTML" ]; then
            echo "CRITICAL: Unauthorized HTML surfaces detected:"
            echo "$UNAUTHORIZED_HTML"
            exit 1
          fi

          echo "Assertion Verified: Zero unauthorized HTML surfaces detected."
