name: Render Parity Synchronization

on:
  push:
    branches: [main, a6-renderer-governance-layer]
  pull_request:
    branches: [main]

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown-first artifact parity
        run: |
          test -f README.md
          test -f SSOT/g10_runtime_governance_ssot.yaml
          test -f METRICS/g10_ascii_metrics.md
          echo "Assertion Verified: Zero unauthorized HTML surfaces detected."
