name: "Runtime Governance Gate"

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  governance-validation:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Codebase"
        uses: actions/checkout@v4

      - name: "Set up Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Install Linting Engine Prerequisites"
        run: |
          python -m pip install --upgrade pip
          pip install ruff yamllint

      - name: "Execute Ruff Lint Verification"
        run: ruff check . --quiet

      - name: "Execute YAML Schema Integration Test"
        run: yamllint KEB/governance/

      - name: "Evaluate Local Execution Rebuild Parameters"
        run: |
          # Enforces Rule CR-004
          python -m venv test_env
          source test_env/bin/activate
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python telemetry/pca/drift_monitor.py
