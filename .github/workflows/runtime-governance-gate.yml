name: "Runtime Governance Gate"

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  governance-validation:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Codebase"
        uses: actions/checkout@v4

      - name: "Set up Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Install Linting Engine Prerequisites"
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            ruff \
            yamllint \
            matplotlib \
            numpy \
            pandas \
            plotly \
            scikit-learn \
            scipy \
            statsmodels

      - name: "Execute Ruff Lint Verification"
        run: ruff check telemetry/pca/drift_monitor.py src/orchestration/semantic_runtime_pipeline_bridge_v1.py --quiet

      - name: "Execute YAML Schema Integration Test"
        run: yamllint KEB/governance/

      - name: "Evaluate Local Execution Rebuild Parameters"
        run: |
          # Enforces Rule CR-004
          python src/orchestration/semantic_runtime_pipeline_bridge_v1.py --out runtime_outputs/wave40
          test -f runtime_outputs/wave40/telemetry.csv
          test -f runtime_outputs/wave40/wave_stats.csv
          test -f runtime_outputs/wave40/pca_components.csv
          test -f runtime_outputs/wave40/anova_two_factor.csv
          test -f runtime_outputs/wave40/plotly_wave_animation.html
          test -f runtime_outputs/wave40/certification_summary.json
