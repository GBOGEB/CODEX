name: Governance Validation

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate governance artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run SSOT validator
        run: python tools/validators/ssot_validator.py

      - name: Run MASTER_input folder validator
        run: python tools/validators/master_input_validator.py

      - name: Publish validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-validation-reports
          path: |
            generated/validation_report.json
            generated/validation_report.md
            generated/master_input_validation.json
            generated/master_input_validation.md
          if-no-files-found: warn
