name: render-regression

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  render-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate regression scaffolds
        run: |
          test -f renderers/regression/html_baseline_compare.py
          test -f renderers/regression/screenshot_compare.py

      - name: Execute runtime theme tests
        run: |
          pytest tests/test_theme_runtime.py

      - name: Placeholder regression execution
        run: |
          echo 'future screenshot diff execution pending'
          echo 'future html semantic diff pending'
