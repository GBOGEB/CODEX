name: Contract Governance Workbench

on:
  push:
    paths:
      - "codex/contract_governance/**"
      - "contract_governance/**"
      - "tests/contract_governance/**"
      - ".github/workflows/contract-governance.yml"
  pull_request:
    paths:
      - "codex/contract_governance/**"
      - "contract_governance/**"
      - "tests/contract_governance/**"
      - ".github/workflows/contract-governance.yml"

jobs:
  build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run contract governance tests
        run: pytest tests/contract_governance
      - name: Build governance snapshots
        run: python -m codex.contract_governance.cli build --ssot contract_governance/ssot/abacus_contract_governance.yaml --out snapshots/contract_governance
      - name: Validate governance snapshots
        run: python -m codex.contract_governance.cli validate --ssot contract_governance/ssot/abacus_contract_governance.yaml --out snapshots/contract_governance
