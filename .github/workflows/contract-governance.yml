name: Contract Governance Workbench

on:
  push:
    paths:
      - "codex/contract_governance/**"
      - "contract_governance/**"
      - "tests/contract_governance/**"
      - "requirements/contract-governance.txt"
      - "scripts/verify_contract_governance.sh"
      - ".github/workflows/contract-governance.yml"
  pull_request:
    paths:
      - "codex/contract_governance/**"
      - "contract_governance/**"
      - "tests/contract_governance/**"
      - "requirements/contract-governance.txt"
      - "scripts/verify_contract_governance.sh"
      - ".github/workflows/contract-governance.yml"

jobs:
  build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned contract governance dependencies
        run: python -m pip install -r requirements/contract-governance.txt
      - name: Install package without dependency re-resolution
        run: python -m pip install --no-build-isolation --no-deps -e .
      - name: Verify contract governance runtime gate
        run: scripts/verify_contract_governance.sh
