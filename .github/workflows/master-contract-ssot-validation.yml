name: MASTER Contract SSOT Validation

on:
  pull_request:
    paths:
      - "schemas/master_contract_ssot.schema.yaml"
      - "ssot/master_contract_ssot_v0_2.yaml"
      - "scripts/validate_master_contract_ssot.py"
      - ".github/workflows/master-contract-ssot-validation.yml"
  push:
    branches:
      - main
    paths:
      - "schemas/master_contract_ssot.schema.yaml"
      - "ssot/master_contract_ssot_v0_2.yaml"
      - "scripts/validate_master_contract_ssot.py"
      - ".github/workflows/master-contract-ssot-validation.yml"

jobs:
  validate-master-contract-ssot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: python -m pip install PyYAML jsonschema
      - name: Validate MASTER contract SSOT
        run: python scripts/validate_master_contract_ssot.py
