version: 0.2.0
system:
  name: GBOGEB/CODEX
  codename: ABACUS_RENDER_PIPELINE

glossary:
  semantic_governance:
    definition: Governance layer responsible for invariants, lineage, tuple continuity, and semantic reproducibility.

  tuple:
    definition: Atomic semantic continuity unit containing intent, lineage, and runtime meaning.

  replay_engine:
    definition: Runtime component responsible for reconstructing semantic state from repository artifacts.

  orchestration_loop:
    definition: Runtime execution loop coordinating replay, drift detection, debt evaluation, and recommendations.

  semantic_debt:
    definition: Accumulated unresolved semantic inconsistencies, missing lineage, or runtime governance gaps.

  digital_twin:
    definition: Reconstructable semantic representation of repository cognition and runtime state.

  renderer_governance:
    definition: Deterministic rendering governance system covering layout, typography, spacing, contrast, and reproducibility.

  contrast_validator:
    definition: WCAG-aware runtime validator that checks semantic surface readability and accessibility.

  renderer_lint_engine:
    definition: Executable governance engine validating manifest structure and renderer governance rules.

  semantic_colors_transform_by_theme:
    definition: Renderer invariant requiring semantic colors to adapt meaningfully to dark/light themes instead of naive inversion.

  semantic_drift_daemon:
    definition: Runtime daemon that tracks semantic drift signals and flags continuity divergence.

  ssot:
    definition: Single source of truth YAML model used to deterministically generate outputs.

  master_slide_registry:
    definition: Canonical registry mapping stable slide identifiers to source lineage and render outputs.

  master_figure_registry:
    definition: Canonical registry of immutable figure identifiers used by rendering and publication systems.

  cognition_runtime:
    definition: Adaptive runtime layer capable of reasoning, prioritization, recommendation, and replay continuity.

  deterministic_rendering:
    definition: Reproducible rendering behavior where equivalent semantic inputs generate equivalent outputs.

  publication_pipeline:
    definition: End-to-end extraction, governance, rendering, validation, and publication workflow.

runtime_maturity:
  semantic_governance: operational
  replay_runtime: operational
  orchestration_runtime: operational
  cognition_runtime: emerging
  renderer_governance: initiated
  wcag_validation: operational
  renderer_linting: operational
  responsive_rendering_qa: planned
