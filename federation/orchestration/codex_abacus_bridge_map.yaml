bridge:
  trace: FEDERATION.WIRELINK.RUNTIME.W000
  repositories:
    codex: GBOGEB/CODEX
    abacus: GBOGEB/ABACUS
    artstyle: GBOGEB/ARTSTYLE
    qplant: GBOGEB/QPLANT
    gemini: GBOGEB/GEMINI
    anthropic: GBOGEB/ANTHROPIC

  federation_ownership:
    # Updated W007.1 (T-20260530-PR200-001): CODEX now owns federation
    CODEX:
      role: federation
      capabilities:
        - federation_rollup
        - federation_scree
        - cross_repo_metrics
        - bottleneck_detection
      wave: W007.1
    ABACUS:
      role: governance
      capabilities:
        - governance
        - metrics_source
        - validation
    ARTSTYLE:
      role: rendering
      capabilities:
        - visual_runtime
        - rendering
    QPLANT:
      role: domain_content
      capabilities:
        - cryogenic_knowledge
        - domain_content
    GEMINI:
      role: mini_federation
      custodian: CLAUDE
      capabilities:
        - integration_bridge
        - shared_architecture
        - confederated_runtime
        - model_bridge
      wave: W007.2B
    ANTHROPIC:
      role: mini_federation
      custodian: CLAUDE
      mirrors: GEMINI
      capabilities:
        - integration_bridge
        - shared_architecture
        - confederated_runtime
        - model_bridge
      wave: W007.2B

  confederated_bridges:
    - bridge_id: claude-mini-federation
      topology: sub_confederation
      hub_repository: GBOGEB/CODEX
      bridge_file: bridges/claude_mini_federation_bridge.yml
      custodian: CLAUDE
      members:
        - GBOGEB/GEMINI
        - GBOGEB/ANTHROPIC
      shared_architecture:
        source_template: GBOGEB/GEMINI
        mirrored_member: GBOGEB/ANTHROPIC
      status: ACTIVE

  module_alignment:
    - abacus_module: renderer
      codex_path: dashboards
      workflow: .github/workflows/pages.yml
      status: ACTIVE
    - abacus_module: topology
      codex_path: federation/orchestration
      workflow: .github/workflows/runtime_convergence_pipeline.yml
      status: INCUBATOR
    - abacus_module: validation
      codex_path: governance
      workflow: .github/workflows/ci.yml
      status: ACTIVE
    - abacus_module: deployment
      codex_path: .github/workflows
      workflow: .github/workflows/full-stack-governance.yml
      status: ACTIVE
    - abacus_module: telemetry
      codex_path: telemetry
      workflow: .github/workflows/runtime_convergence_pipeline.yml
      status: INCUBATOR
    - abacus_module: federation_rollup
      codex_path: src/qplant_presentation_engine
      artifacts:
        - metrics/federation/federation_rollup.json
        - metrics/federation/federation_scree.json
        - metrics/federation/federation_metrics.json
      wave: W007.1
      tuple: T-20260530-PR200-001
      status: ACTIVE
