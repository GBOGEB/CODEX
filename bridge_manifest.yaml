federation_bridge:
  version: "1.0.0"
  domain: "gbogeb"
  repos:
    codex:
      url: "https://github.com/gbogeb/codex"
      branch: "main"
      role: "upstream_conceptual"
      focus: "Markdown, requirements, metadata, YAML glossary"
    abacus:
      url: "https://github.com/gbogeb/abacus"
      branch: "main"
      role: "downstream_functional"
      focus: "Python math engines, calculation schemas, code execution"
    gemini:
      url: "https://github.com/GBOGEB/GEMINI"
      branch: "main"
      role: "mini_federation"
      focus: "Shared mini-federation template, integration bridge, independent confederated runtime"
      custodian: "CLAUDE"
    anthropic:
      url: "https://github.com/GBOGEB/ANTHROPIC"
      branch: "main"
      role: "mini_federation"
      focus: "Mirrored GEMINI mini-federation member for shared architecture and integration"
      custodian: "CLAUDE"
  orchestration:
    mcp_enabled: true
    protocols:
      - git-sync
      - telemetry-stream
      - artifact-bake
  wave_tracking:
    analytics:
      - PCA
      - DMAIC
      - ANOVA
    metrics:
      claimed_progress: float
      actual_progress: float
      covariance_threshold: 0.05
