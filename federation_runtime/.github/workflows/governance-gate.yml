name: W003 Governance Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: ["wave/W003-*", "pr/PR-007-*"]

jobs:
  governance-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: federation_runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install jsonschema
      - name: Run governance parser
        run: python engines/governance_parser.py
