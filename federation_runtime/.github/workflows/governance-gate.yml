name: W003 Governance Gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'federation_runtime/**'
  push:
    branches: ['wave/W003-*', 'pr/PR-007-*']
    paths:
      - 'federation_runtime/**'

jobs:
  governance-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate governance header
        run: python federation_runtime/engines/governance_parser.py --target federation_runtime/.github/W003_PR_FOLLOW_UP.md --schema federation_runtime/schema/governance_header.schema.json
      - name: Validate traceability manifest shape
        run: python -c "import json; d=json.load(open('federation_runtime/governance/traceability_manifest.json')); assert d['active_wave']=='W003'; assert 'pr_stream' in d"
