%YAML 1.2
---
# TODO: Wave A6.2 — Office365 binary classification rules needed
# - Task A6.2.1.1: Document Office365 classification taxonomy (governance/schemas/office365_binary_classification.schema.yaml)
# - Task A6.2.1.2: Implement classification logic in Office365GraphConnector.classify_binary()
# - Task A6.2.1.3: Wire classification into binary index ledger
# See: MANIFEST/A6_FEDERATION_TODO_ROADMAP.md § Phase A6.2

runtime:
  engine: "Alpha A6"
  framework_version: "2026.1.0"
  telemetry_format: "markdown-ascii"

security_boundaries:
  corporate:
    auth_provider: "Windows Active Directory / Office 365"
    storage_sync: "OneDrive"
    allowed_formats: ["pptx", "docx", "xlsx", "pdf"]
  federation:
    allowed_tokens:
      - "GITHUB_API_TOKEN"
      - "OPENAI_API_TOKEN"
      - "GEMINI_PRO_API_TOKEN"
      - "ABACUS_API_TOKEN"

wire_links:
  strict_pruning: true
  allow_ephemeral_exploitation: true
  target_repositories:
    - name: "GBOGEB/CODEX"
      alias: "codex"
    - name: "GBOGEB/ABACUS"
      alias: "abacus"

rendering_defaults:
  vector:
    visio_export: "svg"
    drawio_export: "svg"
    powerpoint_export: "emf"
  plots:
    engine: "static-svg" # No live Plotly JS payloads; raw SVG injection only

identity_boundaries:
  lanes:
    office365_graph_session: "isolated"
    github_session: "isolated"
    apple_personal_session: "isolated"
  token_reuse_across_lanes: false

binary_sources:
  office365:
    system_of_record: "office365"
    graph_base_url: "https://graph.microsoft.com"
    cache_root: "cache/office365"
    supported_formats: ["pptx", "docx", "xlsx", "pdf"]
  github:
    system_of_record: "github"
    stores_only: ["source", "metadata"]

mcp_sweep:
  enabled: false
  near_miss_keywords: ["near-miss", "optimization"]
  stale_status_values: ["stale", "deprecated", "superseded"]
  output:
    telemetry_markdown: "telemetry/mcp_sweep_latest.md"
    rtm_delta: "semantic_substrate/rtm_lineage_delta.yaml"
